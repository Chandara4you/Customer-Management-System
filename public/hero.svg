<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <defs>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.35"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ── Background dots grid ──────────────────────────── -->
  <g opacity="0.12">
    <circle cx="20" cy="20" r="1.5" fill="white"/>
    <circle cx="60" cy="20" r="1.5" fill="white"/>
    <circle cx="100" cy="20" r="1.5" fill="white"/>
    <circle cx="140" cy="20" r="1.5" fill="white"/>
    <circle cx="180" cy="20" r="1.5" fill="white"/>
    <circle cx="220" cy="20" r="1.5" fill="white"/>
    <circle cx="260" cy="20" r="1.5" fill="white"/>
    <circle cx="300" cy="20" r="1.5" fill="white"/>
    <circle cx="340" cy="20" r="1.5" fill="white"/>
    <circle cx="380" cy="20" r="1.5" fill="white"/>
    <circle cx="420" cy="20" r="1.5" fill="white"/>
    <circle cx="460" cy="20" r="1.5" fill="white"/>
    <circle cx="20" cy="60" r="1.5" fill="white"/>
    <circle cx="60" cy="60" r="1.5" fill="white"/>
    <circle cx="100" cy="60" r="1.5" fill="white"/>
    <circle cx="140" cy="60" r="1.5" fill="white"/>
    <circle cx="180" cy="60" r="1.5" fill="white"/>
    <circle cx="220" cy="60" r="1.5" fill="white"/>
    <circle cx="260" cy="60" r="1.5" fill="white"/>
    <circle cx="300" cy="60" r="1.5" fill="white"/>
    <circle cx="340" cy="60" r="1.5" fill="white"/>
    <circle cx="380" cy="60" r="1.5" fill="white"/>
    <circle cx="420" cy="60" r="1.5" fill="white"/>
    <circle cx="460" cy="60" r="1.5" fill="white"/>
    <circle cx="20" cy="100" r="1.5" fill="white"/>
    <circle cx="60" cy="100" r="1.5" fill="white"/>
    <circle cx="100" cy="100" r="1.5" fill="white"/>
    <circle cx="140" cy="100" r="1.5" fill="white"/>
    <circle cx="180" cy="100" r="1.5" fill="white"/>
    <circle cx="220" cy="100" r="1.5" fill="white"/>
    <circle cx="260" cy="100" r="1.5" fill="white"/>
    <circle cx="300" cy="100" r="1.5" fill="white"/>
    <circle cx="340" cy="100" r="1.5" fill="white"/>
    <circle cx="380" cy="100" r="1.5" fill="white"/>
    <circle cx="420" cy="100" r="1.5" fill="white"/>
    <circle cx="460" cy="100" r="1.5" fill="white"/>
  </g>

  <!-- ── Main dashboard card ────────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="60" y="40" width="280" height="180" rx="16" fill="white" fill-opacity="0.08"/>
    <rect x="60" y="40" width="280" height="180" rx="16" stroke="white" stroke-opacity="0.15" stroke-width="1"/>

    <!-- Card header -->
    <rect x="60" y="40" width="280" height="42" rx="16" fill="white" fill-opacity="0.05"/>
    <rect x="75" y="53" width="90" height="8" rx="4" fill="white" fill-opacity="0.7"/>
    <rect x="75" y="65" width="55" height="5" rx="2.5" fill="white" fill-opacity="0.35"/>

    <!-- Status dot -->
    <circle cx="312" cy="60" r="5" fill="#34d399"/>
    <circle cx="312" cy="60" r="8" fill="#34d399" fill-opacity="0.2"/>

    <!-- Metric row -->
    <rect x="75" y="100" width="60" height="9" rx="4.5" fill="white" fill-opacity="0.5"/>
    <rect x="75" y="114" width="45" height="24" rx="6" fill="white" fill-opacity="0.12"/>
    <text x="86" y="132" font-family="system-ui" font-size="14" font-weight="700" fill="white" fill-opacity="0.9">248</text>

    <rect x="155" y="100" width="60" height="9" rx="4.5" fill="white" fill-opacity="0.5"/>
    <rect x="155" y="114" width="45" height="24" rx="6" fill="white" fill-opacity="0.12"/>
    <text x="166" y="132" font-family="system-ui" font-size="14" font-weight="700" fill="#34d399">↑ 12%</text>

    <rect x="235" y="100" width="60" height="9" rx="4.5" fill="white" fill-opacity="0.5"/>
    <rect x="235" y="114" width="45" height="24" rx="6" fill="white" fill-opacity="0.12"/>
    <text x="246" y="132" font-family="system-ui" font-size="14" font-weight="700" fill="white" fill-opacity="0.9">₱84k</text>

    <!-- Mini bar chart -->
    <rect x="75" y="160" width="8" height="32" rx="3" fill="url(#bar2)" fill-opacity="0.6"/>
    <rect x="89" y="148" width="8" height="44" rx="3" fill="url(#bar1)"/>
    <rect x="103" y="154" width="8" height="38" rx="3" fill="url(#bar2)" fill-opacity="0.6"/>
    <rect x="117" y="144" width="8" height="48" rx="3" fill="url(#bar1)"/>
    <rect x="131" y="152" width="8" height="40" rx="3" fill="url(#bar2)" fill-opacity="0.6"/>
    <rect x="145" y="158" width="8" height="34" rx="3" fill="url(#bar2)" fill-opacity="0.5"/>
    <rect x="159" y="146" width="8" height="46" rx="3" fill="url(#bar1)"/>

    <!-- Sparkline -->
    <polyline points="205,175 220,160 235,165 250,150 265,155 280,142 295,148 310,135" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <polyline points="205,175 220,160 235,165 250,150 265,155 280,142 295,148 310,135 310,192 205,192" fill="#3b82f6" fill-opacity="0.1"/>
    <circle cx="310" cy="135" r="3" fill="#93c5fd"/>
  </g>

  <!-- ── Floating mini-card: customers ─────────────────── -->
  <g filter="url(#shadow-sm)" transform="translate(0, -5)">
    <rect x="300" y="70" width="140" height="76" rx="12" fill="white" fill-opacity="0.1"/>
    <rect x="300" y="70" width="140" height="76" rx="12" stroke="white" stroke-opacity="0.2" stroke-width="1"/>

    <!-- Avatar cluster -->
    <circle cx="316" cy="92" r="10" fill="#2563eb"/>
    <text x="316" y="97" font-family="system-ui" font-size="9" font-weight="700" fill="white" text-anchor="middle">JD</text>
    <circle cx="330" cy="92" r="10" fill="#1d4ed8"/>
    <text x="330" y="97" font-family="system-ui" font-size="9" font-weight="700" fill="white" text-anchor="middle">MR</text>
    <circle cx="344" cy="92" r="10" fill="#1e40af"/>
    <text x="344" y="97" font-family="system-ui" font-size="9" font-weight="700" fill="white" text-anchor="middle">AS</text>
    <circle cx="358" cy="92" r="10" fill="white" fill-opacity="0.15"/>
    <text x="358" y="97" font-family="system-ui" font-size="9" fill="white" fill-opacity="0.7" text-anchor="middle">+8</text>

    <rect x="314" y="110" width="70" height="6" rx="3" fill="white" fill-opacity="0.6"/>
    <rect x="314" y="120" width="48" height="5" rx="2.5" fill="white" fill-opacity="0.3"/>

    <!-- Trend badge -->
    <rect x="394" y="108" width="34" height="18" rx="9" fill="#34d399" fill-opacity="0.2"/>
    <text x="411" y="121" font-family="system-ui" font-size="9" font-weight="700" fill="#34d399" text-anchor="middle">+11</text>
  </g>

  <!-- ── Floating mini-card: payterm breakdown ─────────── -->
  <g filter="url(#shadow-sm)">
    <rect x="30" y="175" width="120" height="100" rx="12" fill="white" fill-opacity="0.1"/>
    <rect x="30" y="175" width="120" height="100" rx="12" stroke="white" stroke-opacity="0.2" stroke-width="1"/>

    <rect x="44" y="188" width="50" height="6" rx="3" fill="white" fill-opacity="0.7"/>
    <rect x="44" y="198" width="32" height="5" rx="2.5" fill="white" fill-opacity="0.35"/>

    <!-- Donut chart (simplified arc) -->
    <circle cx="90" cy="235" r="24" stroke="white" stroke-opacity="0.1" stroke-width="10" fill="none"/>
    <circle cx="90" cy="235" r="24" stroke="#3b82f6" stroke-width="10" fill="none"
      stroke-dasharray="75 75" stroke-linecap="round" transform="rotate(-90 90 235)"/>
    <circle cx="90" cy="235" r="24" stroke="#60a5fa" stroke-width="10" fill="none"
      stroke-dasharray="40 110" stroke-linecap="round" stroke-dashoffset="-75" transform="rotate(-90 90 235)"/>
    <text x="90" y="240" font-family="system-ui" font-size="10" font-weight="700" fill="white" text-anchor="middle">3</text>

    <!-- Legend dots -->
    <circle cx="48" cy="225" r="3" fill="#3b82f6"/>
    <rect x="54" y="222" width="22" height="5" rx="2.5" fill="white" fill-opacity="0.5"/>
    <circle cx="48" cy="238" r="3" fill="#60a5fa"/>
    <rect x="54" y="235" width="18" height="5" rx="2.5" fill="white" fill-opacity="0.5"/>
    <circle cx="48" cy="251" r="3" fill="#93c5fd"/>
    <rect x="54" y="248" width="14" height="5" rx="2.5" fill="white" fill-opacity="0.5"/>
  </g>

  <!-- ── Connection lines (decorative) ─────────────────── -->
  <line x1="170" y1="220" x2="30" y2="225" stroke="white" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="340" y1="85" x2="300" y2="92" stroke="white" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ── Bottom right: notification pill ───────────────── -->
  <g filter="url(#shadow-sm)">
    <rect x="330" y="200" width="130" height="40" rx="20" fill="white" fill-opacity="0.12"/>
    <rect x="330" y="200" width="130" height="40" rx="20" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="354" cy="220" r="10" fill="#2563eb" fill-opacity="0.4"/>
    <text x="354" y="225" font-family="system-ui" font-size="12" text-anchor="middle" fill="white">✓</text>
    <rect x="372" y="213" width="56" height="6" rx="3" fill="white" fill-opacity="0.7"/>
    <rect x="372" y="223" width="38" height="5" rx="2.5" fill="white" fill-opacity="0.35"/>
  </g>
</svg>
